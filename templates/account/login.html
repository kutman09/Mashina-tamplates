{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="auth-page">
  <div class="auth-overlay"></div>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="{% static 'images/logo.png' %}" alt="Alay Avto 777" height="80">
        <h2 class="auth-title">Войти в аккаунт</h2>
      </div>
      <form method="post" class="auth-form">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label text-light">Имя пользователя</label>
          <input type="text" name="login" class="form-control dark-input" placeholder="Введите логин" autofocus required>
        </div>
        <div class="mb-3">
          <label class="form-label text-light">Пароль</label>
          <input type="password" name="password" class="form-control dark-input" placeholder="Введите пароль" required>
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" name="remember" class="form-check-input" id="id_remember">
          <label class="form-check-label text-light" for="id_remember">Запомнить меня</label>
        </div>
        <button type="submit" class="btn btn-danger w-100 fw-bold py-2">Войти</button>
      </form>
      <div class="auth-footer">
        <p class="text-muted">Нет аккаунта? <a href="/accounts/signup/" class="text-danger fw-bold">Зарегистрироваться</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
